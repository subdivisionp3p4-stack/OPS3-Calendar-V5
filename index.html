      }
      
      const today = new Date();
      for(let d = 1; d <= daysInMonth; d++){
        const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        cal.appendChild(createDay(d, false, month, year, isToday));
      }
      
      const total = firstDay + daysInMonth;
      const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
      for(let d = 1; d <= remaining; d++){
        cal.appendChild(createDay(d, true, month + 1, year));
      }
    }
    
    function createDay(day, isOther, month, year, isToday=false){
      const div = document.createElement('div');
      div.className = 'day' + (isOther ? ' other-month' : '') + (isToday ? ' today' : '');
      
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      div.innerHTML = `<div class="day-number">${day}</div>`;
      
      if(tasks[dateStr]){
        Object.entries(tasks[dateStr]).forEach(([id, task]) => {
          const t = document.createElement('div');
          t.className = `task ${task.type}`;
          t.textContent = task.time ? `${task.time} ${task.title}` : task.title;
          t.onclick = (e) => {e.stopPropagation(); editTask(dateStr, id, task);};
          div.appendChild(t);
          if(task.type === 'holiday') div.classList.add('holiday-day');
        });
      }
      
      div.onclick = () => openModal(dateStr);
      return div;
    }
    
    function openModal(date, id=null, task=null){
      editingTaskId = id;
      document.getElementById('taskDate').value = date;
      document.getElementById('modalTitle').innerHTML = id ? '<i class="fa-solid fa-pen-to-square"></i> EDIT MISSION' : '<i class="fa-solid fa-rocket"></i> NEW MISSION';
      document.getElementById('deleteBtn').style.display = id ? 'block' : 'none';
      
      if(task){
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskTime').value = task.time || '';
        document.getElementById('taskType').value = task.type;
        document.getElementById('taskDetail').value = task.detail || '';
      } else {
        document.getElementById('taskForm').reset();
        document.getElementById('taskDate').value = date;
      }
      
      document.getElementById('taskModal').style.display = 'flex';
    }
    
    function editTask(date, id, task){
      openModal(date, id, task);
    }
    
    function closeModal(){
      document.getElementById('taskModal').style.display = 'none';
      editingTaskId = null;
    }
    
    document.getElementById('taskForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        title: document.getElementById('taskTitle').value,
        date: document.getElementById('taskDate').value,
        time: document.getElementById('taskTime').value,
        type: document.getElementById('taskType').value,
        detail: document.getElementById('taskDetail').value
      };
      
      try {
        if(editingTaskId){
          await set(ref(db, `tasks/${data.date}/${editingTaskId}`), data);
        } else {
          await push(ref(db, `tasks/${data.date}`), data);
        }
        showStatus('<i class="fa-solid fa-circle-check"></i> MISSION LAUNCHED SUCCESSFULLY');
        closeModal();
      } catch(err) {
        showStatus(`<i class="fa-solid fa-triangle-exclamation"></i> LAUNCH FAILED: ${err.message}`, 'error');
      }
    };
    
    document.getElementById('deleteBtn').onclick = async () => {
      if(confirm('Abort this mission?')){
        const date = document.getElementById('taskDate').value;
        await remove(ref(db, `tasks/${date}/${editingTaskId}`));
        showStatus('<i class="fa-solid fa-trash"></i> MISSION ABORTED');
        closeModal();
      }
    };
    
    document.getElementById('cancelBtn').onclick = closeModal;
    document.getElementById('addBtn').onclick = () => {
      const today = new Date().toISOString().split('T')[0];
      openModal(today);
    };
    
    document.getElementById('prevBtn').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    };
    
    document.getElementById('nextBtn').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    };
    
    onValue(ref(db, 'tasks'), (snap) => {
      tasks = snap.val() || {};
      renderCalendar();
      showStatus('<i class="fa-solid fa-satellite-dish"></i> CONNECTED TO MISSION CONTROL - REAL-TIME SYNC ACTIVE');
    }, (err) => {
      showStatus(`<i class="fa-solid fa-triangle-exclamation"></i> CONNECTION LOST: ${err.message}`, 'error');
    });
    
    renderCalendar();
  </script>
</body>
</html>
